name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    name: TypeScript and Rust checks
    runs-on: macos-latest
    timeout-minutes: 20

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Show Rust toolchain
        run: rustup show

      - name: Check Tauri Rust crate
        run: cargo check --manifest-path src-tauri/Cargo.toml
